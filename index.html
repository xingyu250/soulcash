<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的饮料贴纸库 | My Cozy Drink Sticker Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            /* 新的颜色变量：牛皮纸色系和贴纸白 */
            --bg-paper: #e6dac8; /* 牛皮纸暖色背景 */
            --box-inner-bg: #d8c3a5; /* 纸箱内部颜色 */
            --box-border: #8b6e51; /* 纸箱边框和胶带颜色 */
            --sticker-bg: #ffffff; /* 贴纸白 */
            --text-color: #5b4d42;
            --accent-color: #d4a373;
            --shadow-sticker: 2px 2px 6px rgba(0,0,0,0.2), -1px -1px 2px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-paper);
            /* 牛皮纸纹理 */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4YjZlNTEiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px 40px;
            line-height: 1.6;
            position: relative;
        }

        header {
            text-align: center;
            padding: 30px 0 50px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Gaegu', 'ZCOOL XiaoWei', serif;
            font-size: 3rem;
            color: #4a3a2e;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: #a08d7c;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Gaegu', cursive;
        }

        /* 输入区域（剪贴板样式） */
        .input-section {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--accent-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: 0 auto 50px;
            position: relative;
            z-index: 10;
        }
        /* 模拟剪贴板夹子 */
        .input-section::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: var(--box-border);
            border-radius: 6px 6px 0 0;
            border: 2px solid #fff;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            border: 2px solid var(--accent-color);
            background: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .file-upload-btn {
            background: var(--accent-color);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-weight: 500;
        }

        .file-upload-btn:hover {
            background: #bc8a5f;
            transform: translateY(-2px);
        }

        #file-input { display: none; }

        /* 纸箱容器 */
        .box-container {
            background-color: var(--box-inner-bg);
            border: 8px solid var(--box-border);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        /* 模拟纸箱边缘和胶带装饰 */
        .box-container::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 40px;
            background: var(--box-border);
            opacity: 0.7;
            transform: rotate(-10deg);
            clip-path: polygon(0 0, 100% 10%, 90% 100%, 10% 90%);
        }

        /* 列表区域 */
        #drink-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        /* 贴纸卡片样式（关键修改） */
        .drink-card {
            background: var(--sticker-bg);
            /* 厚白色贴纸边框 */
            border: 10px solid white;
            border-radius: 6px; /* 极小圆角 */
            overflow: hidden;
            box-shadow: var(--shadow-sticker);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1);
            cursor: grab;
            position: relative;
            /* 模拟裁剪不规则边缘：可以使用稍微不规则的多边形遮罩，但这很复杂且很难贴合图片比例 */
            /* 妥协方案：使用厚边框和 contain 模式，让图片展示在白底上，使其看起来像贴在白纸上的饮品 */
        }

        .drink-card:active { cursor: grabbing; z-index: 10; }

        /* 饮品图片区域 */
        .drink-card img {
            width: 100%;
            height: 200px; /* 固定高度，可能导致图片拉伸或裁剪，但保持统一贴纸大小 */
            object-fit: contain; /* 关键：保持图片比例，居中在白色边框内展示 */
            background: #fcf8f2; /* 图片内部浅色背景 */
            display: block;
        }

        .card-content {
            padding: 15px;
            text-align: center;
        }

        .drink-name {
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'Gaegu', cursive;
            margin-bottom: 15px;
            display: block;
            border-bottom: 1px dashed var(--accent-color);
            padding-bottom: 5px;
        }

        /* 色卡展示（改为圆形 dot stickers） */
        .color-palette {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .color-swatch {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: var(--shadow-sticker);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .color-swatch span {
            font-size: 8px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            display: none; /* 隐藏代码，保持干净 */
        }
        
        .color-swatch:hover span { display: block; }

        /* 删除按钮 */
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 5;
        }

        .drink-card:hover .delete-btn { opacity: 1; }

        /* 装饰图标样式 */
        .decor-icon {
            position: fixed;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        /* 拖拽中的样式 */
        .sortable-ghost {
            opacity: 0.3;
            transform: rotate(0deg) scale(0.9);
        }

        .sortable-chosen {
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 10px solid white; /* 保持厚边框 */
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            #drink-list { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;}
            .box-container { padding: 20px; }
            .drink-card img { height: 180px; }
        }
    </style>
</head>
<body>

    <svg class="decor-icon" style="top:10%; left:5%;" width="60" height="60" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#d4a373"/><path d="M50 10L50 90" stroke="#fff" stroke-width="5"/><circle cx="50" cy="50" r="10" fill="#fff"/></svg> <svg class="decor-icon" style="bottom:15%; right:8%;" width="50" height="50" viewBox="0 0 100 100"><path d="M10 10 C 20 40, 60 40, 90 10" stroke="#bc8a5f" stroke-width="8" fill="none"/><path d="M10 30 L 90 30 M10 50 L 90 50 M10 70 L 90 70" stroke="#bc8a5f" stroke-width="4"/></svg> <header>
        <h1>我的饮料贴纸库</h1>
        <div class="subtitle">My Cozy Drink Sticker Collection</div>
    </header>

    <section class="input-section">
        <div class="input-group">
            <input type="text" id="drink-name" placeholder="在这里添加你的新饮料贴纸..." maxlength="15">
            <label for="file-input" class="file-upload-btn">上传饮品，制作贴纸</label>
            <input type="file" id="file-input" accept="image/*">
        </div>
    </section>

    <main class="box-container">
        <div id="drink-list">
            </div>
    </main>

    <script>
        const drinkList = document.getElementById('drink-list');
        const fileInput = document.getElementById('file-input');
        const nameInput = document.getElementById('drink-name');
        const colorThief = new ColorThief();

        let drinks = JSON.parse(localStorage.getItem('my_drinks') || '[]');

        // 初始化渲染
        renderDrinks();

        // 图片处理与添加
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const name = nameInput.value.trim() || "未命名贴纸";
            
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                const img = new Image();
                img.src = base64;
                
                img.onload = function() {
                    // 提取颜色
                    const palette = colorThief.getPalette(img, 3);
                    const colors = palette.map(rgb => rgbToHex(rgb[0], rgb[1], rgb[2]));
                    
                    const newDrink = {
                        id: Date.now(),
                        name: name,
                        image: base64,
                        colors: colors
                    };

                    drinks.unshift(newDrink); // 新添加的放前面
                    saveAndRender();
                    nameInput.value = ''; // 清空输入
                };
            };
            reader.readAsDataURL(file);
        });

        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        function renderDrinks() {
            drinkList.innerHTML = '';
            drinks.forEach((drink) => {
                const card = document.createElement('div');
                card.className = 'drink-card';
                card.dataset.id = drink.id;
                
                let colorHtml = drink.colors.map(c => `
                    <div class="color-swatch" style="background-color: ${c}">
                        <span>${c.toUpperCase()}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteDrink(${drink.id})">×</button>
                    <img src="${drink.image}" alt="${drink.name}">
                    <div class="card-content">
                        <span class="drink-name">${drink.name}</span>
                        <div class="color-palette">
                            ${colorHtml}
                        </div>
                    </div>
                `;
                
                // 在渲染时为贴纸添加随机旋转
                card.style.transform = `rotate(${Math.random() * 6 - 3}deg)`;
                
                drinkList.appendChild(card);
            });
        }

        function deleteDrink(id) {
            if(confirm('确定要从贴纸库移出这款贴纸吗？')) {
                drinks = drinks.filter(d => d.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('my_drinks', JSON.stringify(drinks));
            renderDrinks();
        }

        // 初始化拖拽排序：确保排序体验同样丝滑
        new Sortable(drinkList, {
            animation: 400,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: function() {
                // 重新获取排序后的数组
                const newOrder = [];
                document.querySelectorAll('.drink-card').forEach(card => {
                    const id = parseInt(card.dataset.id);
                    const drink = drinks.find(d => d.id === id);
                    if (drink) newOrder.push(drink);
                });
                drinks = newOrder;
                localStorage.setItem('my_drinks', JSON.stringify(drinks));
            }
        });
    </script>
</body>
</html>
