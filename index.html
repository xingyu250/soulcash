<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的饮料贴纸库 | Final Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --paper-dark: #d4bc9d;
            --paper-light: #eaddca;
            --box-inner: #c5ad8d;
            --accent: #8b6e51;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0e6d6;
            background-image: radial-gradient(#d4bc9d 1px, transparent 1px);
            background-size: 20px 20px;
            color: #5d4a3a;
            padding: 20px;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Gaegu', cursive; font-size: 2.5rem; color: #4a3a2e; }

        /* 上传区 */
        .upload-zone {
            background: #fff;
            max-width: 400px;
            margin: 0 auto 30px;
            padding: 15px;
            border-radius: 8px;
            border-bottom: 5px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #drink-name {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .btn-upload {
            display: block;
            background: var(--accent);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #file-input { display: none; }

        /* 纸箱容器 */
        .cardboard-box {
            background: var(--box-inner);
            max-width: 900px;
            margin: 0 auto;
            border: 10px solid var(--paper-dark);
            border-radius: 4px;
            padding: 40px 15px;
            position: relative;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.2);
            min-height: 450px;
        }

        #sticker-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 25px;
        }

        /* 贴纸样式 */
        .sticker-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: grab;
            transition: transform 0.2s;
        }

        .sticker-wrapper {
            position: relative;
            /* 关键：模拟白边的多重投影 */
            filter: 
                drop-shadow(3px 0 0 white) 
                drop-shadow(-3px 0 0 white) 
                drop-shadow(0 3px 0 white) 
                drop-shadow(0 -3px 0 white)
                drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            margin-bottom: 10px;
        }

        .sticker-img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            background: #eee;
            display: block;
            /* 默认剪裁路径 */
            clip-path: polygon(5% 2%, 96% 0%, 100% 95%, 2% 100%);
        }

        .sticker-label {
            font-family: 'Gaegu', cursive;
            background: white;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 1rem;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .del-btn {
            position: absolute;
            top: -5px; right: 0;
            background: #ff4757; color: white;
            border: none; width: 20px; height: 20px;
            border-radius: 50%; cursor: pointer;
            z-index: 10; display: none;
        }
        .sticker-item:hover .del-btn { display: block; }

        .sortable-ghost { opacity: 0; }
    </style>
</head>
<body>

    <header>
        <h1>我的饮料贴纸库</h1>
    </header>

    <div class="upload-zone">
        <input type="text" id="drink-name" placeholder="给贴纸起个名字...">
        <label for="file-input" class="btn-upload">📸 制作贴纸</label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="cardboard-box">
        <div id="sticker-container"></div>
    </div>

    <script>
        const container = document.getElementById('sticker-container');
        const fileInput = document.getElementById('file-input');
        const nameInput = document.getElementById('drink-name');
        const colorThief = new ColorThief();

        // 使用新键名避开旧缓存空间
        let stickerData = JSON.parse(localStorage.getItem('drink_stickers_v4_stable') || '[]');

        render();

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            console.log("文件已选择，开始处理...");

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    console.log("图片加载成功，开始压缩...");
                    
                    const canvas = document.createElement('canvas');
                    const size = 300; // 进一步缩小尺寸以保证存储成功
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    
                    const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                    
                    // 使用 jpeg 并降低质量来极大地压缩体积
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);

                    // 颜色提取加防护
                    let colors = ["#d4bc9d"];
                    try {
                        const palette = colorThief.getPalette(img, 2);
                        colors = palette.map(rgb => `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`);
                    } catch(err) {
                        console.warn("颜色提取跳过:", err);
                    }

                    const newSticker = {
                        id: Date.now(),
                        name: nameInput.value || "未命名",
                        img: base64,
                        colors: colors,
                        rotate: Math.random() * 10 - 5,
                        path: `polygon(${Math.random()*10}% ${Math.random()*10}%, ${90+Math.random()*10}% ${Math.random()*10}%, ${90+Math.random()*10}% ${90+Math.random()*10}%, ${Math.random()*10}% ${90+Math.random()*10}%)`
                    };

                    stickerData.unshift(newSticker);
                    if(save()) {
                        render();
                        nameInput.value = '';
                        console.log("贴纸添加成功！");
                    }
                };
            };
            reader.readAsDataURL(file);
        });

        function render() {
            container.innerHTML = '';
            stickerData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                div.dataset.id = item.id;
                div.style.transform = `rotate(${item.rotate}deg)`;

                div.innerHTML = `
                    <button class="del-btn" onclick="remove(${item.id})">✕</button>
                    <div class="sticker-wrapper">
                        <img src="${item.img}" class="sticker-img" style="clip-path: ${item.path}">
                    </div>
                    <div class="sticker-label">${item.name}</div>
                `;
                container.appendChild(div);
            });
        }

        function remove(id) {
            stickerData = stickerData.filter(i => i.id !== id);
            save();
            render();
        }

        function save() {
            try {
                localStorage.setItem('drink_stickers_v4_stable', JSON.stringify(stickerData));
                return true;
            } catch (e) {
                console.error("存储失败:", e);
                alert("存储空间不足！请删除一些旧贴纸。");
                return false;
            }
        }

        // 初始化拖拽
        new Sortable(container, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: () => {
                const ids = [...container.querySelectorAll('.sticker-item')].map(el => parseInt(el.dataset.id));
                stickerData = ids.map(id => stickerData.find(i => i.id === id));
                save();
            }
        });
    </script>
</body>
</html>
