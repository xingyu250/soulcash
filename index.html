<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOYAGE LOG | 星屿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Noto+Serif+SC:wght@200;500&display=swap');
        
        :root { --accent: #818cf8; }
        body { background: #000; color: #fff; font-family: 'Noto Serif SC', serif; overflow: hidden; }
        .vibe-font { font-family: 'Syncopate', sans-serif; }
        
        /* 这里的 CSS 决定了顶级质感 */
        #map { position: absolute; inset: 0; filter: grayscale(1) invert(0.9) contrast(1.2); }
        .glass { background: rgba(0,0,0,0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* 自定义呼吸灯 Marker */
        .marker-pulse {
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 0 rgba(129, 140, 248, 0.4); animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(129, 140, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- 入口蒙层：氛围感核心 -->
    <div id="hero" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-all duration-[1200ms] ease-[cubic-bezier(0.23,1,0.32,1)]">
        <div class="absolute inset-0 bg-black z-[-1]"></div>
        <div class="absolute w-[80vw] h-[80vw] bg-indigo-500/10 rounded-full blur-[120px]"></div>
        
        <h1 class="vibe-font text-3xl md:text-5xl font-bold tracking-[0.5em] mb-4 opacity-0 animate-[fadeIn_2s_forwards]">VOYAGE LOG</h1>
        <p class="text-zinc-500 tracking-[0.3em] font-light mb-16 opacity-0 animate-[fadeIn_2s_1s_forwards]">星屿旅行志</p>
        
        <button onclick="startVoyage()" class="group relative px-12 py-4 border border-zinc-800 hover:border-white transition-all duration-700">
            <span class="vibe-font text-[10px] tracking-[0.8em] relative z-10">ENTER</span>
            <div class="absolute inset-0 bg-white scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-500"></div>
        </button>
    </div>

    <!-- 主界面 -->
    <div class="relative w-screen h-screen flex">
        <!-- 侧边栏：磨砂质感 -->
        <aside id="sidebar" class="fixed left-0 top-0 h-full w-full md:w-[350px] glass z-50 translate-x-[-100%] transition-transform duration-[800ms] flex flex-col">
            <div class="p-12 border-b border-white/5">
                <button onclick="backToHero()" class="vibe-font text-[8px] tracking-[0.4em] text-zinc-500 hover:text-white mb-6 transition-colors">← INDEX</button>
                <h2 class="vibe-font text-xl tracking-[0.2em]">LOGS</h2>
            </div>
            <div id="list-container" class="flex-1 overflow-y-auto p-8 space-y-8 hide-scrollbar">
                <!-- 动态注入数据 -->
            </div>
        </aside>

        <!-- 地图容器 -->
        <div id="map"></div>
    </div>

    <script>
        const DATA = [
            { name: "西安", coords: [34.3416, 108.9398], date: "2023", info: "十三朝古都，旅途的锚点。" },
            { name: "山东", coords: [36.6683, 117.0204], date: "2026", info: "齐鲁之地，山海共生。" }
        ];

        let map;

        function initApp() {
            if (map) return;
            map = L.map('map', { zoomControl: false, center: [35.5, 110.0], zoom: 5 });
            
            // 选用最干净的深色地图服务
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            const container = document.getElementById('list-container');
            DATA.forEach(loc => {
                // Marker 逻辑
                const icon = L.divIcon({ className: '', html: '<div class="marker-pulse"></div>', iconSize: [12, 12] });
                L.marker(loc.coords, { icon }).addTo(map).bindPopup(`<div style="color:#000;font-family:serif;"><b>${loc.name}</b><br>${loc.info}</div>`);

                // 侧边栏卡片逻辑
                const div = document.createElement('div');
                div.className = "group cursor-pointer border-l border-zinc-800 pl-6 hover:border-indigo-400 transition-all py-2";
                div.innerHTML = `
                    <p class="vibe-font text-[9px] text-zinc-500 group-hover:text-indigo-400 transition-colors">${loc.date}</p>
                    <h3 class="text-xl tracking-widest mt-1">${loc.name}</h3>
                `;
                div.onclick = () => map.flyTo(loc.coords, 9, { duration: 2 });
                container.appendChild(div);
            });
        }

        function startVoyage() {
            document.getElementById('hero').style.transform = 'scale(1.5)';
            document.getElementById('hero').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('hero').classList.add('hidden');
                document.getElementById('sidebar').classList.add('translate-x-0');
                initApp();
            }, 800);
        }

        function backToHero() {
            location.reload(); // 最简单的状态重置
        }
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .leaflet-popup-content-wrapper { background: rgba(255,255,255,0.9); border-radius: 0; }
    </style>
</body>
</html>
