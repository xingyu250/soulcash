<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的饮料贴纸库 | Sticker Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --paper-dark: #d4bc9d;
            --paper-light: #eaddca;
            --box-inner: #c5ad8d;
            --sticker-border: #ffffff;
            --accent: #8b6e51;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0e6d6;
            /* 牛皮纸底纹 */
            background-image: radial-gradient(#d4bc9d 1px, transparent 1px);
            background-size: 20px 20px;
            color: #5d4a3a;
            padding: 20px;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Gaegu', cursive; font-size: 3rem; color: #4a3a2e; }
        .subtitle { font-family: 'Gaegu', cursive; font-size: 1.2rem; opacity: 0.7; }

        /* 上传区域：模拟文件夹 */
        .upload-zone {
            background: #fff;
            max-width: 450px;
            margin: 0 auto 40px;
            padding: 20px;
            border-radius: 8px;
            border-left: 10px solid var(--accent);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .upload-zone input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--accent);
            border-radius: 4px;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-upload {
            display: block;
            background: var(--accent);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-upload:hover { filter: brightness(1.2); }
        #file-input { display: none; }

        /* 纸箱设计 */
        .cardboard-box {
            background: var(--box-inner);
            max-width: 1000px;
            margin: 40px auto;
            border: 12px solid var(--paper-dark);
            border-radius: 4px;
            padding: 50px 30px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2), 0 20px 40px rgba(0,0,0,0.15);
            min-height: 500px;
        }

        /* 模拟纸箱盖子 */
        .cardboard-box::before, .cardboard-box::after {
            content: '';
            position: absolute;
            background: var(--paper-light);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 1;
        }
        /* 左盖子 */
        .cardboard-box::before {
            top: -12px; left: -80px; width: 80px; height: 100.5%;
            transform-origin: right;
            transform: perspective(600px) rotateY(20deg);
            border: 2px solid var(--paper-dark);
        }
        /* 右盖子 */
        .cardboard-box::after {
            top: -12px; right: -80px; width: 80px; height: 100.5%;
            transform-origin: left;
            transform: perspective(600px) rotateY(-20deg);
            border: 2px solid var(--paper-dark);
        }

        #sticker-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 40px;
            position: relative;
            z-index: 2;
        }

        /* 核心：贴纸外观设计 */
        .sticker-item {
            position: relative;
            cursor: grab;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sticker-item:active { cursor: grabbing; }

        /* 贴纸图片层 */
        .sticker-wrapper {
            position: relative;
            /* 关键滤镜：模拟厚白边 */
            filter: 
                drop-shadow(4px 0 0 white) 
                drop-shadow(-4px 0 0 white) 
                drop-shadow(0 4px 0 white) 
                drop-shadow(0 -4px 0 white)
                drop-shadow(5px 8px 10px rgba(0,0,0,0.2));
            margin-bottom: 15px;
        }

        .sticker-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            /* 模拟不规则手工剪裁 */
            clip-path: polygon(
                10% 0%, 90% 5%, 100% 15%, 95% 85%, 
                85% 100%, 15% 95%, 0% 80%, 5% 15%
            );
            background: #eee;
            display: block;
        }

        /* 饮品名字：手写标签感 */
        .sticker-label {
            font-family: 'Gaegu', cursive;
            background: rgba(255,255,255,0.9);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 1.2rem;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            border: 1px solid #eee;
        }

        /* 色卡：小圆点贴纸 */
        .palette-dots {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .del-btn {
            position: absolute;
            top: -10px;
            right: 0;
            background: #ff4757;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 10;
        }
        .sticker-item:hover .del-btn { display: block; }

        .sortable-ghost { opacity: 0.2; transform: scale(0.8); }

        @media (max-width: 600px) {
            .cardboard-box::before, .cardboard-box::after { display: none; }
            .cardboard-box { margin: 10px; padding: 20px; border-width: 6px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>我的饮料贴纸库</h1>
        <p class="subtitle">Drink Sticker Archive</p>
    </header>

    <div class="upload-zone">
        <input type="text" id="drink-name" placeholder="为这枚贴纸命名...">
        <label for="file-input" class="btn-upload">✨ 制作我的贴纸</label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="cardboard-box">
        <div id="sticker-container"></div>
    </div>

    <script>
        const container = document.getElementById('sticker-container');
        const fileInput = document.getElementById('file-input');
        const nameInput = document.getElementById('drink-name');
        const colorThief = new ColorThief();

        let stickerData = JSON.parse(localStorage.getItem('drink_stickers_v3') || '[]');

        render();

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    // 1. 压缩图片
                    const canvas = document.createElement('canvas');
                    const size = 400; // 贴纸质量上限
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    
                    // 居中裁剪成正方形绘制到 canvas
                    const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                    
                    const base64 = canvas.toDataURL('image/webp', 0.8);

                    // 2. 提取颜色
                    let colors = ["#ffffff"];
                    try {
                        colors = colorThief.getPalette(img, 3).map(rgb => `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`);
                    } catch(e) {}

                    // 3. 生成随机形状和旋转
                    const randomPath = generateRandomClipPath();
                    
                    stickerData.unshift({
                        id: Date.now(),
                        name: nameInput.value || "好喝的",
                        img: base64,
                        colors: colors,
                        rotate: Math.random() * 14 - 7,
                        path: randomPath
                    });

                    save();
                    render();
                    nameInput.value = '';
                };
            };
            reader.readAsDataURL(file);
        });

        // 核心函数：生成不规则的剪裁路径，让贴纸更真实
        function generateRandomClipPath() {
            const v = () => 10 + Math.random() * 80; 
            // 返回一个稍微扭曲的多边形
            return `polygon(
                ${Math.random()*15}% ${Math.random()*15}%, 
                ${85 + Math.random()*15}% ${Math.random()*15}%, 
                ${85 + Math.random()*15}% ${85 + Math.random()*15}%, 
                ${Math.random()*15}% ${85 + Math.random()*15}%
            )`;
        }

        function render() {
            container.innerHTML = '';
            stickerData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                div.dataset.id = item.id;
                div.style.transform = `rotate(${item.rotate}deg)`;

                const dots = item.colors.map(c => `<div class="dot" style="background:${c}"></div>`).join('');

                div.innerHTML = `
                    <button class="del-btn" onclick="remove(${item.id})">✕</button>
                    <div class="sticker-wrapper">
                        <img src="${item.img}" class="sticker-img" style="clip-path: ${item.path || 'none'}">
                    </div>
                    <div class="sticker-label">${item.name}</div>
                    <div class="palette-dots">${dots}</div>
                `;
                container.appendChild(div);
            });
        }

        function remove(id) {
            stickerData = stickerData.filter(i => i.id !== id);
            save();
            render();
        }

        function save() {
            localStorage.setItem('drink_stickers_v3', JSON.stringify(stickerData));
        }

        new Sortable(container, {
            animation: 350,
            ghostClass: 'sortable-ghost',
            onEnd: () => {
                const ids = [...container.querySelectorAll('.sticker-item')].map(el => parseInt(el.dataset.id));
                stickerData = ids.map(id => stickerData.find(i => i.id === id));
                save();
            }
        });
    </script>
</body>
</html>
