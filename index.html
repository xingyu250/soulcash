<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XINGYU | THE VOYAGE</title>
    <!-- 引入极简地图与动效库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Noto+Serif+SC:wght@200;500&display=swap');
        
        :root { --accent: #818cf8; }
        body, html { margin: 0; background: #000; color: #fff; font-family: 'Syncopate', sans-serif; overflow: hidden; }

        /* 极简深色地图层 */
        #map { position: absolute; inset: 0; filter: grayscale(1) invert(0.9) contrast(1.2); opacity: 0; transition: opacity 3s ease; }
        
        /* 玻璃拟态侧边栏 */
        .glass-nav { background: rgba(0,0,0,0.4); backdrop-filter: blur(40px); border-right: 1px solid rgba(255,255,255,0.05); transform: translateX(-100%); transition: all 1s cubic-bezier(0.23, 1, 0.32, 1); }
        .active .glass-nav { transform: translateX(0); }

        /* 呼吸光点标记 */
        .marker-dot { width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff, 0 0 40px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* 入口大片既视感 */
        #hero { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; transition: all 1.5s cubic-bezier(0.77, 0, 0.175, 1); }
        #hero.fade-out { transform: translateY(-100%); opacity: 0; }

        .letter-spacing-huge { letter-spacing: 1.5em; text-indent: 1.5em; }
        .text-serif { font-family: 'Noto Serif SC', serif; }
        
        .list-item:hover .item-line { width: 100%; }
        .item-line { width: 0; height: 1px; background: var(--accent); transition: width 0.6s ease; }
    </style>
</head>
<body>

    <!-- 1. 入口页：电影感开场 -->
    <section id="hero">
        <div class="mb-4 overflow-hidden">
            <h2 id="title" class="text-xs tracking-[1em] text-zinc-500 uppercase opacity-0 translate-y-full transition-all duration-1000">Xingyu's Chronicles</h2>
        </div>
        <h1 class="text-4xl md:text-6xl font-bold letter-spacing-huge my-10 border-y border-white/5 py-12">星屿</h1>
        <button onclick="startVoyage()" class="mt-10 group relative px-12 py-4 overflow-hidden">
            <span class="relative z-10 text-[10px] tracking-[0.5em] uppercase">Enter the Map</span>
            <div class="absolute bottom-0 left-0 w-full h-[1px] bg-white/20 group-hover:h-full group-hover:bg-white transition-all duration-500"></div>
            <style>.group:hover span { color: #000; font-weight: bold; }</style>
        </button>
    </section>

    <!-- 2. 主交互区 -->
    <div id="main-ui" class="relative w-full h-screen flex">
        <!-- 地图容器 -->
        <div id="map"></div>

        <!-- 侧边栏：极简主义布局 -->
        <nav class="glass-nav relative z-10 w-full md:w-[380px] h-full flex flex-col p-12">
            <div class="mb-20">
                <p class="text-[10px] tracking-[0.8em] text-zinc-500 uppercase mb-2">Portfolio Project</p>
                <h3 class="text-2xl font-bold tracking-widest uppercase">Coordinates</h3>
            </div>

            <div id="location-list" class="flex-1 space-y-12 text-serif">
                <!-- 由 JS 填充 -->
            </div>

            <div class="pt-10 opacity-30 text-[8px] tracking-[0.5em] uppercase">
                © 2026 Interactive Experience
            </div>
        </nav>
    </div>

    <script>
        const DATA = [
            { id: 1, name: "西安", en: "Xi'an", pos: [34.3416, 108.9398], date: "2023.09", desc: "古都余晖，旅程之始" },
            { id: 2, name: "山东", en: "Shandong", pos: [36.6683, 117.0204], date: "2026.05", desc: "齐鲁大地，海风长鸣" }
        ];

        let map;

        // 页面加载后的文字入场
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('title').classList.remove('opacity-0', 'translate-y-full');
            }, 500);
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, zoomSnap: 0.1 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            DATA.forEach(loc => {
                const icon = L.divIcon({ className: '', html: '<div class="marker-dot"></div>', iconSize: [10, 10] });
                L.marker(loc.pos, { icon }).addTo(map);

                // 侧边栏列表生成
                const item = document.createElement('div');
                item.className = "list-item cursor-pointer group";
                item.innerHTML = `
                    <div class="flex items-end gap-4 mb-2">
                        <span class="text-2xl font-medium tracking-tighter">${loc.name}</span>
                        <span class="text-[8px] text-zinc-500 uppercase mb-1 tracking-widest">${loc.en} / ${loc.date}</span>
                    </div>
                    <div class="item-line"></div>
                    <p class="text-[10px] text-zinc-400 mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-500 tracking-widest font-light">${loc.desc}</p>
                `;
                item.onclick = () => map.flyTo(loc.pos, 9, { duration: 2.5 });
                document.getElementById('location-list').appendChild(item);
            });
            
            map.setView([35, 110], 5);
        }

        function startVoyage() {
            document.getElementById('hero').classList.add('fade-out');
            document.body.classList.add('active');
            setTimeout(() => {
                document.getElementById('map').style.opacity = '1';
                initMap();
            }, 1000);
        }
    </script>
</body>
</html>
