<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微醺时刻 | 我的私藏饮品志</title>
    <!-- 引入字体和图标 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <!-- 引入 SortableJS 用于拖拽 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- 引入 ColorThief 用于提取颜色 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent-color: #d4a373;
            --text-color: #5b4d42;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 163, 115, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(212, 163, 115, 0.08) 0%, transparent 20%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-family: 'ZCOOL+XiaoWei', serif;
            font-size: 2.5rem;
            color: #4a3a2e;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #a08d7c;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* 表单区域 */
        .input-section {
            max-width: 500px;
            margin: 0 auto 50px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            border: none;
            background: rgba(212, 163, 115, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            color: var(--text-color);
        }

        .file-upload-btn {
            background: var(--accent-color);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-weight: 500;
        }

        .file-upload-btn:hover {
            background: #bc8a5f;
            transform: translateY(-2px);
        }

        #file-input { display: none; }

        /* 列表区域 */
        #drink-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .drink-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1);
            cursor: grab;
            position: relative;
            border: 1px solid transparent;
        }

        .drink-card:active { cursor: grabbing; }

        .drink-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 20px;
        }

        .drink-name {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 15px;
            display: block;
        }

        /* 色卡展示 */
        .color-palette {
            display: flex;
            gap: 10px;
        }

        .color-swatch {
            flex: 1;
            height: 45px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            position: relative;
            transition: flex 0.3s;
        }
        
        .color-swatch:hover { flex: 1.5; }

        /* 删除按钮 */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .drink-card:hover .delete-btn { opacity: 1; }

        /* 拖拽中的样式 */
        .sortable-ghost {
            opacity: 0.3;
            transform: scale(0.9);
        }

        .sortable-chosen {
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid var(--accent-color);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            #drink-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>微醺时刻</h1>
        <div class="subtitle">Personal Drink Collection</div>
    </header>

    <section class="input-section">
        <div class="input-group">
            <input type="text" id="drink-name" placeholder="给这款饮品起个好听的名字..." maxlength="15">
            <label for="file-input" class="file-upload-btn">上传饮品照片</label>
            <input type="file" id="file-input" accept="image/*">
        </div>
    </section>

    <main id="drink-list">
        <!-- 卡片动态插入到这里 -->
    </main>

    <script>
        const drinkList = document.getElementById('drink-list');
        const fileInput = document.getElementById('file-input');
        const nameInput = document.getElementById('drink-name');
        const colorThief = new ColorThief();

        let drinks = JSON.parse(localStorage.getItem('my_drinks') || '[]');

        // 初始化渲染
        renderDrinks();

        // 图片处理与添加
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const name = nameInput.value.trim() || "未命名饮品";
            
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                const img = new Image();
                img.src = base64;
                
                img.onload = function() {
                    // 提取颜色
                    const palette = colorThief.getPalette(img, 3);
                    const colors = palette.map(rgb => rgbToHex(rgb[0], rgb[1], rgb[2]));
                    
                    const newDrink = {
                        id: Date.now(),
                        name: name,
                        image: base64,
                        colors: colors
                    };

                    drinks.unshift(newDrink); // 新添加的放前面
                    saveAndRender();
                    nameInput.value = ''; // 清空输入
                };
            };
            reader.readAsDataURL(file);
        });

        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        function renderDrinks() {
            drinkList.innerHTML = '';
            drinks.forEach((drink) => {
                const card = document.createElement('div');
                card.className = 'drink-card';
                card.dataset.id = drink.id;
                
                let colorHtml = drink.colors.map(c => `
                    <div class="color-swatch" style="background-color: ${c}">
                        <span>${c.toUpperCase()}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteDrink(${drink.id})">×</button>
                    <img src="${drink.image}" alt="${drink.name}">
                    <div class="card-content">
                        <span class="drink-name">${drink.name}</span>
                        <div class="color-palette">
                            ${colorHtml}
                        </div>
                    </div>
                `;
                drinkList.appendChild(card);
            });
        }

        function deleteDrink(id) {
            if(confirm('确定要移除这款饮品吗？')) {
                drinks = drinks.filter(d => d.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('my_drinks', JSON.stringify(drinks));
            renderDrinks();
        }

        // 初始化拖拽排序
        new Sortable(drinkList, {
            animation: 400,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: function() {
                // 重新获取排序后的数组
                const newOrder = [];
                document.querySelectorAll('.drink-card').forEach(card => {
                    const id = parseInt(card.dataset.id);
                    const drink = drinks.find(d => d.id === id);
                    if (drink) newOrder.push(drink);
                });
                drinks = newOrder;
                localStorage.setItem('my_drinks', JSON.stringify(drinks));
            }
        });
    </script>
</body>
</html>
